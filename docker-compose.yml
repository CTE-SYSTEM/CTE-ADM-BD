services:
  db:
    image: postgres:16
    container_name: postgres_cte
    restart: always
    environment:
      - POSTGRES_USER=User_admin
      - POSTGRES_PASSWORD=TuPasswordSeguro123!
      - POSTGRES_DB=Centro_Tecnico_Electronico
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data # <--- Tus datos se guardarán aquí
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U User_admin -d Centro_Tecnico_Electronico"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend_cte
    command: sh -c "npx prisma generate && npx prisma db push && npm run db:functions:container && npm run db:seed:container && sleep 5 && npm run dev"
    # command: sh -c "npx prisma generate && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://User_admin:TuPasswordSeguro123!@db:5432/Centro_Tecnico_Electronico?schema=public
      - SQL_DATABASE_URL=postgresql://User_admin:TuPasswordSeguro123!@db:5432/Centro_Tecnico_Electronico
      - FRONTEND_URL=http://localhost:5173
      - CORS_ORIGIN=http://localhost:5173
      - JWT_SECRET=tu_secreto_super_seguro
      - NODE_ENV=development
    ports:
      - "5000:5000"
      - "5555:5555"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_cte
    command: sh -c "sleep 5 && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    environment:
      - VITE_PROXY_TARGET=http://backend:5000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_cte
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=sadiel@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8080:80" # Entrarás por localhost:8080
    depends_on:
      - db
